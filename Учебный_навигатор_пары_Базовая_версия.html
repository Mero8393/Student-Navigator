.lesson { padding: 10px; border-bottom: 1px solid #ddd; }
.lesson:last-child { border-bottom: 0; }
.badge { background: #e3f2fd; color: #0d47a1; border-radius: 20px; padding: 4px 9px; font-weight: bold; font-size: 13px; }

  ]},
  5: { day: 'Пятница', short: 'ПТ', lessons: [] }

function toMinutes(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }
function render() {
 const d = new Date().getDay();
 const nowMin = new Date().getHours()*60 + new Date().getMinutes();
 const day = schedule[d] || {day:'Выходной', lessons:[]};
 const lessons = day.lessons || [];
 const current = lessons.find(l => nowMin >= toMinutes(l.start) && nowMin <= toMinutes(l.end));
 const next = lessons.find(l => toMinutes(l.start) > nowMin);
 document.getElementById('now').innerHTML = current ? `<h2>Сейчас идёт: ${current.subject}</h2><p><b>Кабинет:</b> ${current.room}</p><p><b>Преподаватель:</b> ${current.teacher}</p><p><b>Время:</b> ${current.start}–${current.end}</p>` : `<h2>Сейчас пары нет</h2><p>${next ? 'Следующая: '+next.subject+' в '+next.start+', кабинет '+next.room : 'Сегодня пар больше нет.'}</p>`;
 document.getElementById('list').innerHTML = lessons.length ? lessons.map(l => `<div class="lesson ${current && current.num===l.num?'active':''}"><b>${l.num} урок</b> ${l.start}–${l.end}<br>${l.subject}<br>${l.teacher}, ${l.room} <span class="badge">${l.type}</span></div>`).join('') : '<p>Сегодня выходной.</p>';
}
render(); setInterval(render, 60000);
</script>
</body>
</html>
